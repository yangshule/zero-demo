syntax = "proto3";

// 声明包名
package user;
option go_package = "./user";

// 定义请求参数
message LoginReq {
    string username = 1;
    string password = 2;
}

// 定义返回结果
message LoginResp {
    bool success = 1;
    string token = 2;
}

// 定义服务 (包含具体的方法)
service User {
    rpc Login(LoginReq) returns(LoginResp);
}
