syntax = "proto3";

// 声明包名
package user;
option go_package = "./user";

// 定义请求参数
message LoginReq {
    string username = 1;
    string password = 2;
}

// 定义返回结果
message LoginResp {
    bool success = 1;
    string token = 2;
}

message UserInfoReq {
    string username = 1; // 用唯一标识 username 来查
}

message UserInfoResp {
    int64 id = 1;
    string username = 2;
    // 真实生产中严禁返回密码，这里为了演示证明查到了真实数据，我们把它带上
    string password = 3; 
}

// 定义服务 (包含具体的方法)
service User {
    rpc Login(LoginReq) returns(LoginResp);
    rpc getUserInfo(UserInfoReq) returns(UserInfoResp);
}


