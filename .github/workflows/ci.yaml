name: Zero-Demo CI Pipeline  # 流水线的名字

# 1. 触发条件
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

# 2. 任务列表
jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    # 动作 1：拉取代码 (升级到 v4)
    - name: Checkout Code
      uses: actions/checkout@v4

    # 动作 2：安装 Go 语言环境并开启缓存 (升级到 v5)
    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.22'
        cache: true  # 核心优化：开启缓存，下次执行 CI 会快很多！

    # 动作 3：先下载依赖！(逻辑修正：必须在测试和检查前执行)
    - name: Download Dependencies
      run: go mod download

    # 动作 4：代码规范检查
    - name: 代码规范检查
      uses: golangci/golangci-lint-action@v3
      with:
        version: latest  # 指定使用最新版的 linter

    # 动作 5：运行单元测试
    - name: 运行单元测试
      run: go test -v ./...

    # 动作 6：尝试编译所有的 Go 代码 (不仅限于 greet.go)
    - name: Build All Go Code
      run: go build ./... # 核心优化：确保整个仓库的代码都能编译通过，不会遗漏报错

    # 动作 7：尝试打包 Docker 镜像
    - name: Test Docker Build
      run: docker build -t zero-demo-test .